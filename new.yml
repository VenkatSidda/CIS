AWSTemplateFormatVersion: 2010-09-09
Description: Stack to create ec2 instance
Parameters:
  InstanceTypeParameter:
    Description: Select Instance Type
    Type: String
    Default: t2.small
    AllowedValues:
      - t2.nano
      - t2.micro
      - t2.small
Resources:
  Instance1:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: ami-0e07dcaca348a
